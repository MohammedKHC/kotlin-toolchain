product:
  type: kmp/lib
  platforms: [ android, iosArm64, iosSimulatorArm64, iosX64 ]

test-dependencies@android:
  - org.robolectric:robolectric:4.16

settings:
  junit: junit-4
  jvm:
    test:
      # Robolectric uses its own MavenArtifactFetcher to download `android-all-instrumented` at test
      # runtime, and does not honor KOTLIN_DEFAULT_MAVEN_CENTRAL_URL. Route it through the JetBrains
      # cache-redirector to avoid HTTP 429 from repo1.maven.org on CI agents.
      systemProperties:
        robolectric.dependency.repo.url: https://cache-redirector.jetbrains.com/repo1.maven.org/maven2
        robolectric.dependency.repo.id: jetbrains-cache-redirector
  kotlin:
    freeCompilerArgs: [ -Xexpect-actual-classes ]
